<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>Kalanden Franse - Apprendre le Français</title>

<style>
:root {
  --bg:#F2EDE3; --paper:#FFFCF5; --ink:#1A1A2E;
  --accent:#C8441A; --blue:#2563A8; --green:#1A7A4A;
  --muted:#7A7468; --line:#E2DAD0; --hl:#FFF3CD; --hl2:#E8F4FF;
  --ok:#1A7A4A; --ko:#C8441A;
  --permis:#0D6E6E;
  --tag-quotidien:#2563A8; --tag-admin:#7B3FB0; --tag-sante:#C8441A;
  --tag-transport:#1A7A4A; --tag-travail:#A07020; --tag-social:#B03060;
  --tag-permis:#0D6E6E;
  --r:14px; --shadow:0 2px 12px rgba(0,0,0,.10);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden}
button{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;cursor:pointer}

/* ── LAYOUT ── */
#app{max-width:600px;margin:0 auto;padding:0 0 calc(72px + var(--safe-bottom))}

/* ── HEADER ── */
.top-bar{
  position:sticky;top:0;z-index:100;
  background:var(--ink);color:white;
  padding:14px 16px 12px;
  display:flex;align-items:center;justify-content:space-between;
}
.top-title{font-family:Georgia,serif;font-size:1.3rem;letter-spacing:-.3px}
.top-title span{color:#FFB347}
.top-sub{font-size:.65rem;opacity:.65;margin-top:1px}
.xp-chip{
  background:rgba(255,255,255,.12);border-radius:99px;
  padding:4px 12px;font-size:.8rem;font-weight:800;
  display:flex;align-items:center;gap:5px;
}
.xp-chip .star{font-size:.9rem}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--paper);border-top:1.5px solid var(--line);
  display:flex;padding:0 0 var(--safe-bottom);
  box-shadow:0 -4px 16px rgba(0,0,0,.08);
}
.bnav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:8px 4px 6px;border:none;background:none;
  font-size:.58rem;font-weight:700;color:var(--muted);
  letter-spacing:.3px;text-transform:uppercase;gap:3px;
  transition:color .15s;cursor:pointer;touch-action:manipulation;
}
.bnav-btn .ico{font-size:1.3rem;line-height:1}
.bnav-btn.active{color:var(--accent)}
.bnav-btn.active .ico-bar{
  width:20px;height:2px;background:var(--accent);border-radius:99px;margin-top:2px;
}

/* ── TAB PAGES ── */
.tab-page{display:none;padding:14px 14px 0;animation:fadeUp .25s ease both}
.tab-page.active{display:block}

/* ── CARD ── */
.card{
  background:var(--paper);border-radius:var(--r);
  padding:20px 18px 16px;box-shadow:var(--shadow);
  border:1px solid var(--line);margin-bottom:12px;
}
.card-label{
  font-size:.63rem;font-weight:800;letter-spacing:2px;
  text-transform:uppercase;color:var(--accent);margin-bottom:14px;
  display:flex;align-items:center;gap:6px;
}

/* ── PROGRESS BAR ── */
.prog-wrap{padding:0 14px;margin:10px 0 4px}
.prog-outer{height:4px;background:var(--line);border-radius:99px;overflow:hidden}
.prog-inner{height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease}
.prog-label{font-size:.7rem;color:var(--muted);font-weight:700;margin-top:5px;text-align:right}

/* ── CAT SCROLL ── */
.cat-scroll{
  display:flex;gap:7px;padding:10px 14px 4px;
  overflow-x:auto;scrollbar-width:none;
}
.cat-scroll::-webkit-scrollbar{display:none}
.cpill{
  flex-shrink:0;padding:6px 13px;border-radius:99px;
  font-size:.73rem;font-weight:800;border:2px solid;
  transition:all .18s;white-space:nowrap;background:transparent;
}
.cpill-all{color:var(--ink);border-color:rgba(26,26,46,.2);background:rgba(26,26,46,.06)}
.cpill-all.on{background:var(--ink);color:white}
.cpill-quotidien{color:var(--tag-quotidien);border-color:rgba(37,99,168,.25);background:rgba(37,99,168,.06)}
.cpill-quotidien.on{background:var(--tag-quotidien);color:white}
.cpill-admin{color:var(--tag-admin);border-color:rgba(123,63,176,.25);background:rgba(123,63,176,.06)}
.cpill-admin.on{background:var(--tag-admin);color:white}
.cpill-sante{color:var(--tag-sante);border-color:rgba(200,68,26,.25);background:rgba(200,68,26,.06)}
.cpill-sante.on{background:var(--tag-sante);color:white}
.cpill-transport{color:var(--tag-transport);border-color:rgba(26,122,74,.25);background:rgba(26,122,74,.06)}
.cpill-transport.on{background:var(--tag-transport);color:white}
.cpill-travail{color:var(--tag-travail);border-color:rgba(160,112,32,.25);background:rgba(160,112,32,.06)}
.cpill-travail.on{background:var(--tag-travail);color:white}
.cpill-social{color:var(--tag-social);border-color:rgba(176,48,96,.25);background:rgba(176,48,96,.06)}
.cpill-social.on{background:var(--tag-social);color:white}
.cpill-permis{color:var(--tag-permis);border-color:rgba(13,110,110,.25);background:rgba(13,110,110,.06)}
.cpill-permis.on{background:var(--tag-permis);color:white}

/* ── MOT DISPLAY ── */
.mot-word{font-family:Georgia,serif;font-size:2.8rem;text-align:center;letter-spacing:-1px;line-height:1;margin-bottom:6px}
.mot-ph{text-align:center;font-size:.9rem;color:var(--blue);font-style:italic;font-weight:400;margin-bottom:8px}
.mot-mk{text-align:center;font-size:1rem;font-weight:800;color:var(--green);margin-bottom:3px}
.mot-fr{text-align:center;font-size:.78rem;color:var(--muted);font-style:italic;margin-bottom:12px}
.mot-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:99px;
  font-size:.65rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
}

/* ── SYLLABLES ── */
.syls{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;margin:14px 0 4px}
.syl{
  font-family:Georgia,serif;font-size:1.25rem;
  padding:6px 13px;border-radius:8px;
  transition:transform .12s,opacity .12s;
  -webkit-user-select:none;user-select:none;
}
.syl:active{transform:scale(.93);opacity:.7}
.syl:nth-child(odd){background:rgba(200,68,26,.1);color:var(--accent)}
.syl:nth-child(even){background:rgba(37,99,168,.1);color:var(--blue)}
.syl-hint{text-align:center;font-size:.63rem;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}

/* ── LISTEN BUTTONS ── */
.listen-row{display:flex;justify-content:center;gap:10px;margin-bottom:14px}
.btn-snd{
  display:flex;align-items:center;gap:6px;
  border:none;border-radius:10px;
  padding:12px 20px;font-size:.84rem;font-weight:800;
  transition:transform .12s,opacity .12s;
  -webkit-user-select:none;user-select:none;
  cursor:pointer;min-height:48px;touch-action:manipulation;
}
.btn-snd:active{transform:scale(.94);opacity:.75}
.btn-snd.playing{opacity:.55;pointer-events:none}
.btn-snd.normal{background:var(--ink);color:white}
.btn-snd.slow{background:var(--blue);color:white}

/* ── EXAMPLE BOX ── */
.ex-box{border-radius:10px;padding:11px 14px;margin-bottom:10px}
.ex-box.fr{background:var(--hl);border-left:3px solid var(--accent)}
.ex-box.mk{background:rgba(26,122,74,.07);border-left:3px solid var(--green)}
.ex-lbl{font-size:.62rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.ex-box.fr .ex-lbl{color:var(--accent)}
.ex-box.mk .ex-lbl{color:var(--green)}
.ex-txt{font-size:.95rem;color:var(--ink);line-height:1.45}
.ex-sub{font-size:.75rem;color:var(--muted);margin-top:3px;font-style:italic}

/* ── NAV BUTTONS ── */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:13px;border-top:1px solid var(--line)}
.btn-nav{
  border-radius:10px;padding:12px 20px;
  font-size:.84rem;font-weight:800;border:2px solid var(--ink);
  background:transparent;color:var(--ink);
  transition:transform .12s,opacity .12s;
  -webkit-user-select:none;user-select:none;
  cursor:pointer;min-height:48px;touch-action:manipulation;
}
.btn-nav:active:not(:disabled){transform:scale(.94);opacity:.75}
.btn-nav.primary{background:var(--accent);border-color:var(--accent);color:white}
.btn-nav:disabled,.btn-nav[disabled]{opacity:.3;pointer-events:none;cursor:default}

/* ── QUIZ ── */
.q-text{font-size:1.05rem;font-weight:700;line-height:1.45;margin-bottom:5px}
.q-sub{font-size:.78rem;color:var(--muted);font-style:italic;margin-bottom:16px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.choice{
  background:var(--paper);border:2px solid var(--line);border-radius:10px;
  padding:13px 12px;font-size:.88rem;font-weight:700;
  text-align:left;color:var(--ink);
  transition:transform .12s,border-color .15s;
  line-height:1.3;
  -webkit-user-select:none;user-select:none;
  cursor:pointer;min-height:48px;touch-action:manipulation;
}
.choice:active:not(:disabled){transform:scale(.96)}
.choice.ok{background:rgba(26,122,74,.1);border-color:var(--ok);color:var(--ok)}
.choice.ko{background:rgba(200,68,26,.08);border-color:var(--ko);color:var(--ko)}
.choice:disabled{pointer-events:none}
.feedback{
  border-radius:10px;padding:11px 14px;font-size:.88rem;font-weight:700;
  display:none;margin-bottom:10px;
}
.feedback.show{display:block;animation:fadeUp .25s ease both}
.feedback.ok{background:rgba(26,122,74,.1);color:var(--ok);border-left:3px solid var(--ok)}
.feedback.ko{background:rgba(200,68,26,.08);color:var(--ko);border-left:3px solid var(--ko)}
.score-lbl{font-size:.78rem;color:var(--muted);font-weight:700}
.score-lbl strong{color:var(--ok)}

/* ── PHRASES ── */
.sent{font-family:Georgia,serif;font-size:1.3rem;line-height:1.65;margin-bottom:10px;color:var(--ink)}
.wpill{display:inline;cursor:pointer;border-bottom:2px solid transparent;border-radius:2px;padding:0 2px;transition:all .15s}
.wpill:hover,.wpill:active{background:rgba(37,99,168,.12);border-bottom-color:var(--blue)}
.wpill.hl{background:var(--hl);border-bottom-color:var(--accent)}
.wtip{background:var(--ink);color:white;border-radius:10px;padding:12px 14px;margin-top:10px;animation:fadeUp .2s ease both}
.wtip-w{font-family:Georgia,serif;font-size:1.05rem;margin-bottom:3px}
.wtip-ph{color:#A8C4E0;font-style:italic;font-size:.78rem}
.wtip-def{color:#CBD5E0;font-size:.78rem;margin-top:2px}
.wtip-mk{color:#6EE7A0;font-size:.8rem;font-weight:800;margin-top:5px}
.wtip-mk::before{content:"🟢 "}

/* ── DICTÉE ── */
.dictee-info{text-align:center;font-size:.84rem;color:var(--muted);font-weight:700;margin-bottom:16px;line-height:1.5}
.dictee-info em{display:block;font-size:.73rem;color:var(--blue);margin-top:3px;font-style:italic}
.dinput{
  width:100%;font-family:Georgia,serif;font-size:1.6rem;
  border:none;border-bottom:2.5px solid var(--ink);background:transparent;
  text-align:center;color:var(--ink);padding:8px 0;outline:none;
  letter-spacing:1px;transition:border-color .2s;
  -webkit-appearance:none;border-radius:0;
}
.dinput:focus{border-bottom-color:var(--blue)}
.dinput.ok{border-bottom-color:var(--ok);color:var(--ok)}
.dinput.ko{border-bottom-color:var(--ko);color:var(--ko)}
.dhint{text-align:center;font-size:.72rem;color:var(--muted);margin-top:6px;min-height:1.2em}

/* ── RECONSTITUTION ── */
.recons-label{font-size:.63rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.recons-zone{min-height:50px;border:2px dashed var(--line);border-radius:10px;padding:9px 12px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.rwords{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 6px;min-height:44px}
.rtok{
  padding:9px 15px;border-radius:8px;font-size:.88rem;font-weight:700;
  border:2px solid;transition:transform .12s;
  -webkit-user-select:none;user-select:none;
  cursor:pointer;min-height:44px;touch-action:manipulation;
  display:inline-flex;align-items:center;
}
.rtok:active{transform:scale(.92)}
.rtok.avail{background:var(--hl2);border-color:rgba(37,99,168,.3);color:var(--blue)}
.rtok.placed{background:rgba(26,122,74,.1);border-color:var(--ok);color:var(--ok)}
.recons-tr{font-size:.78rem;font-style:italic;color:var(--green);font-weight:700;margin-top:5px}

/* ── PHONÉTIQUE ── */
.phon-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.phon-card{background:var(--paper);border:1.5px solid var(--line);border-radius:12px;padding:13px 12px;box-shadow:var(--shadow)}
.phon-letters{font-family:Georgia,serif;font-size:1.5rem;color:var(--accent);margin-bottom:2px}
.phon-sound{font-size:.78rem;color:var(--blue);font-style:italic;margin-bottom:4px}
.phon-rule{font-size:.74rem;color:var(--muted);line-height:1.4}
.phon-mk{font-size:.72rem;color:var(--green);margin-top:5px;font-style:italic}
.phon-exs{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.phon-ex{font-size:.7rem;background:var(--hl2);color:var(--blue);padding:2px 8px;border-radius:99px;font-weight:700}
.phon-ex:active{background:var(--blue);color:white}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.scard{background:var(--paper);border:1.5px solid var(--line);border-radius:12px;padding:14px 8px;text-align:center}
.snum{font-family:Georgia,serif;font-size:1.9rem;color:var(--accent);line-height:1}
.slbl{font-size:.6rem;color:var(--muted);font-weight:800;letter-spacing:.4px;text-transform:uppercase;margin-top:3px}
.hist-list{list-style:none}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:.85rem}
.hist-item:last-child{border-bottom:none}
.hscore.g{color:var(--ok);font-weight:800}
.hscore.m{color:var(--tag-travail);font-weight:800}
.hscore.b{color:var(--ko);font-weight:800}

/* ── RÉSULTATS ── */
.result-big{text-align:center;padding:28px 0 18px}
.result-num{font-family:Georgia,serif;font-size:4rem;color:var(--ok);line-height:1}
.result-pct{font-size:1.1rem;color:var(--muted);font-weight:800;margin-top:4px}
.result-msg{font-size:.9rem;color:var(--muted);margin-top:5px}

/* ── EMPTY ── */
.empty{text-align:center;padding:36px 0;color:var(--muted);font-size:.9rem}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
@keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-5px)}50%{transform:translateX(5px)}}
@keyframes pop{0%{transform:scale(.94)}60%{transform:scale(1.07)}100%{transform:scale(1)}}
.shake{animation:shake .3s ease}
.pop{animation:pop .25s ease}

/* ── RESPONSIVE ── */
@media(max-width:360px){
  .choices{grid-template-columns:1fr}
  .mot-word{font-size:2.3rem}
  .phon-grid{grid-template-columns:1fr}
}
.dm-btn{
  flex:1;padding:10px 0;border-radius:10px;font-size:.84rem;font-weight:800;
  border:2px solid var(--line);background:transparent;color:var(--muted);
  transition:all .18s;cursor:pointer;min-height:48px;touch-action:manipulation;
}
.dm-btn.dm-on{background:var(--accent);border-color:var(--accent);color:white;}
.dm-btn:active{transform:scale(.95);opacity:.8}

<style>
/* ── STYLE PC ── */
@media (min-width: 600px) {
  #app { max-width: 780px !important; }
  .card { padding: 28px 32px 24px !important; }
  .top-bar { padding: 18px 24px 14px !important; }
  .top-title { font-size: 1.7rem !important; }
  .mot-word { font-size: 4rem !important; }
  .mot-ph { font-size: 1.1rem !important; }
  .mot-mk { font-size: 1.2rem !important; }
  .sent { font-size: 1.6rem !important; }
  .choice { font-size: 1rem !important; padding: 16px 14px !important; }
  .btn-snd { padding: 12px 28px !important; font-size: 1rem !important; min-height: 52px !important; }
  .btn-nav { padding: 11px 24px !important; font-size: .95rem !important; min-height: 52px !important; }
  .bottom-nav { max-width: 780px !important; left: 50% !important; transform: translateX(-50%) !important; }
  .bnav-btn { font-size: .65rem !important; padding: 10px 4px 8px !important; }
  .bnav-btn .ico { font-size: 1.5rem !important; }
  .syl { font-size: 1.6rem !important; padding: 8px 18px !important; }
  .tab-page { padding: 18px 18px 0 !important; }
  .cat-scroll { padding: 12px 18px 6px !important; }
  .cpill { font-size: .82rem !important; padding: 7px 16px !important; }
  .choices { grid-template-columns: 1fr 1fr !important; gap: 14px !important; }
  .dinput { font-size: 2rem !important; }
  .phon-grid { grid-template-columns: 1fr 1fr 1fr !important; }
  body { background-attachment: fixed; }
}
/* Curseur normal sur PC */
.btn-snd, .btn-nav, .cpill, .choice, .syl, .rtok, .wpill, .phon-ex, .bnav-btn {
  cursor: pointer !important;
}
</style>

</head>
<body>
<div id="app">

<!-- TOP BAR -->
<div id="drive-banner" style="background:#1a73e8;color:white;text-align:center;padding:8px 14px;font-size:.75rem;font-weight:700;display:none">
  📂 Pour le son : ouvre ce fichier depuis <strong>Google Drive</strong> dans Chrome
</div>
<div id="firefox-banner" style="background:#ff9500;color:white;text-align:center;padding:10px 16px;font-size:.85rem;font-weight:700;line-height:1.4">
  🦊 Pour que le son fonctionne : ouvre ce fichier avec <strong>Firefox</strong> (pas Chrome)<br>
  <span style="font-weight:400;font-size:.78rem">Télécharge Firefox gratuitement sur mozilla.org si tu ne l'as pas</span>
</div>
<div class="top-bar">
  <div>
    <div class="top-title">Kalanden <span>Fransɛ</span></div>
    <div class="top-sub">Malinké ↔ Français • Mobile</div>
  </div>
  <div class="xp-chip">
    <span class="star">⭐</span>
    <span id="xp-display">0</span> XP
  </div>
</div>

<!-- PAGES -->
<div id="pg-mots" class="tab-page active">
  <div class="cat-scroll" id="cat-mots"></div>
  <div class="prog-wrap"><div class="prog-outer"><div class="prog-inner" id="pb-mots" style="width:0%"></div></div><div class="prog-label" id="pt-mots"></div></div>
  <div style="padding:0 0;margin-top:8px" id="card-mot"></div>
</div>

<div id="pg-phrases" class="tab-page">
  <div class="prog-wrap"><div class="prog-outer"><div class="prog-inner" id="pb-phrases" style="width:0%"></div></div><div class="prog-label" id="pt-phrases"></div></div>
  <div style="margin-top:8px" id="card-phrase"></div>
</div>

<div id="pg-quiz" class="tab-page">
  <div class="cat-scroll" id="cat-quiz"></div>
  <div class="prog-wrap"><div class="prog-outer"><div class="prog-inner" id="pb-quiz" style="width:0%"></div></div><div class="prog-label" id="pt-quiz"></div></div>
  <div style="margin-top:8px" id="card-quiz"></div>
</div>

<div id="pg-dictee" class="tab-page">
  <div style="display:flex;gap:8px;padding:10px 14px 4px">
    <button id="dm-mots" class="dm-btn dm-on" onclick="setDicteeMode('mots')">🔤 Mots</button>
    <button id="dm-phrases" class="dm-btn" onclick="setDicteeMode('phrases')">💬 Phrases</button>
  </div>
  <div class="prog-wrap"><div class="prog-outer"><div class="prog-inner" id="pb-dictee" style="width:0%"></div></div><div class="prog-label" id="pt-dictee"></div></div>
  <div style="margin-top:8px" id="card-dictee"></div>
</div>

<div id="pg-recons" class="tab-page">
  <div class="prog-wrap"><div class="prog-outer"><div class="prog-inner" id="pb-recons" style="width:0%"></div></div><div class="prog-label" id="pt-recons"></div></div>
  <div style="margin-top:8px" id="card-recons"></div>
</div>

<div id="pg-phon" class="tab-page">
  <div id="card-phon" style="margin-top:8px"></div>

const PAGES=['mots','phrases','quiz','dictee','recons','phon','stats'];
function showTab(name,btn){
  PAGES.forEach(p=>{
    const el=document.getElementById('pg-'+p);
    if(el) el.classList.toggle('active',p===name);
  });
  document.querySelectorAll('.bnav-btn').forEach(b=>{
    b.classList.remove('active');
    b.querySelector('.ico-bar')?.remove();
  });
  if(btn){
    btn.classList.add('active');
    const bar=document.createElement('span');
    bar.className='ico-bar';
    btn.appendChild(bar);
  }
  if(name==='phon') renderPhon();
  if(name==='stats') renderStats();
}

//  SPEECH — sync dans le handler click (fix Android file://)
// ═══════════════════════════════════════════════
function speak(text, slow) {
  if (!window.speechSynthesis) {
    alert("Ton navigateur ne supporte pas la synthèse vocale.");
    return;
  }
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = "fr-FR";
  u.rate = slow ? 0.55 : 0.85;
  u.pitch = 1.0;
  u.volume = 1.0;
  var voices = window.speechSynthesis.getVoices();
  for (var i = 0; i < voices.length; i++) {
    if (voices[i].lang && voices[i].lang.indexOf("fr") === 0) {
      u.voice = voices[i];
      break;
    }
  }
  window.speechSynthesis.speak(u);
}

    var u = new SpeechSynthesisUtterance(text);
    u.lang = "fr-FR";
    u.rate = slow ? 0.55 : 0.85;
    u.pitch = 1.0;
    u.volume = 1.0;
    var voices = window.speechSynthesis.getVoices();
    var fr = null;
    for (var i = 0; i < voices.length; i++) {
      if (voices[i].lang === "fr-FR") { fr = voices[i]; break; }
    }
    if (!fr) {
      for (var i = 0; i < voices.length; i++) {
        if (voices[i].lang && voices[i].lang.indexOf("fr") === 0) { fr = voices[i]; break; }
      }
    }
    if (fr) u.voice = fr;
    window.speechSynthesis.speak(u);
  }

  var voices = window.speechSynthesis.getVoices();
  if (voices.length > 0) {
    doSpeak();
  } else {
    window.speechSynthesis.onvoiceschanged = function() {
      window.speechSynthesis.onvoiceschanged = null;
      doSpeak();
    };
  }
}

function setDicteeMode(mode){
  S.dictee.mode = mode;
  const bm = document.getElementById('dm-mots');
  const bp = document.getElementById('dm-phrases');
  if(bm) bm.classList.toggle('dm-on', mode==='mots');
  if(bp) bp.classList.toggle('dm-on', mode==='phrases');
  initDictee();
}

function initDictee(){
  const mode = S.dictee.mode || 'mots';
  let list;
  if(mode === 'phrases'){
    list = shuffle(PHRASES.map(p => ({ text: p.text, trans: p.trans, isPhrase: true })));
  } else {
    list = shuffle(MOTS.map(m => ({ word: m.word, ph: m.ph, tr: m.tr, isPhrase: false })));
  }
  S.dictee = { idx: 0, checked: false, score: 0, list, mode };
  renderDictee();
}

function renderDictee(){
  const { idx, checked, list, score, mode } = S.dictee;
  const isP = mode === 'phrases';
  if(!list || !list.length) return;

  if(idx >= list.length){
    const pct = Math.round(score / list.length * 100);
    S.history.push({ label: 'Kumakan ' + (isP ? '(Kɔrɔ)' : '(Kuma)'), score, total: list.length, pct });
    setProg('pb-dictee','pt-dictee', list.length, list.length, 'Laban !');
    document.getElementById('card-dictee').innerHTML = `<div class="card">
      <div class="card-label">🎧 Laban</div>
      <div class="result-big">
        <div class="result-num">${score}/${list.length}</div>
        <div class="result-pct">${pct}%</div>
        <div class="result-msg">${pct>=80?'⭐ Aw ni kɛ !':pct>=50?'👍 Nɔgɔ !':'📚 Segin kuma kan.'}</div>
      </div>
      <div class="nav-row" style="justify-content:center"><button class="btn-nav primary" onclick="initDictee()">↺ Dɔ tɔ</button></div>
    </div>`;
    return;
  }

  setProg('pb-dictee','pt-dictee', idx, list.length, `${idx+1} / ${list.length}`);
  const item = list[idx];
  const spoken = isP ? item.text : item.word;
  // Échapper les apostrophes pour l'attribut onclick
  const spokenJ = JSON.stringify(spoken);

  const infoText = isP
    ? 'Kɔrɔ mɛn ka a sɛbɛn fransɛ la<em>Écoute la phrase et écris-la en français</em>'
    : 'Kuma mɛn ka a sɛbɛn fransɛ la<em>Écoute et écris le mot en français</em>';

  const mkBox = isP
    ? `<div style="background:rgba(26,122,74,.08);border-radius:10px;padding:10px 13px;margin-bottom:14px;font-size:.82rem;color:var(--green);font-weight:700;line-height:1.4">🟢 Malinké : ${item.trans}</div>`
    : '';

  const inputEl = isP
    ? `<textarea class="dinput" id="d-inp" rows="3"
        style="min-height:72px;resize:none;font-size:.98rem;line-height:1.5;padding:10px 12px;border:2px solid var(--line);border-radius:10px;display:block;width:100%;background:transparent;outline:none;font-family:inherit;"
        inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false"
        placeholder="Écris la phrase ici…"
        ${checked ? 'disabled' : ''}></textarea>`
    : `<input class="dinput" id="d-inp" type="text"
        inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false"
        placeholder="Sɛbɛn yen…"
        onkeydown="handleDicteeKey(event)"
        ${checked ? 'disabled' : ''}/>`;

  document.getElementById('card-dictee').innerHTML = `<div class="card">
    <div class="card-label">🎧 Kumakan — ${isP ? 'Kɔrɔ (phrase)' : 'Kuma (mot)'}</div>
    <div class="dictee-info">${infoText}</div>
    <div class="listen-row" style="margin-bottom:${isP ? '12' : '20'}px">
      <button class="btn-snd normal" onclick="speak(${spokenJ})">${spkI()} Mɛn</button>
      <button class="btn-snd slow" onclick="speak(${spokenJ},true)">${clkI()} Nɔgɔya</button>
    </div>
    ${mkBox}
    ${inputEl}
    <div class="dhint" id="d-hint">${checked ? '' : (isP ? 'Écris puis clique → Segin' : '↵ Entrée ou → Segin')}</div>
    <div class="feedback" id="d-fb"></div>
    <div class="nav-row" style="margin-top:14px">
      <span></span>
      ${checked
        ? `<button class="btn-nav primary" onclick="nextDictee()">Nata →</button>`
        : `<button class="btn-nav primary" onclick="checkDictee()">Segin ✓</button>`}
    </div>
  </div>`;
  if(!checked) setTimeout(() => document.getElementById('d-inp')?.focus(), 80);
}

function normStr(s){
  return s.trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[.,!?;:\']/g,'').replace(/\s+/g,' ');
}

function handleDicteeKey(e){ if(e.key==='Enter') checkDictee(); }

function checkDictee(){
  if(S.dictee.checked) return;
  const inp = document.getElementById('d-inp');
  if(!inp) return;
  const val = normStr(inp.value);
  const item = S.dictee.list[S.dictee.idx];
  const isP = S.dictee.mode === 'phrases';
  const tgt = normStr(isP ? item.text : item.word);

  let ok = false, pctMatch = 100;
  if(isP){
    const vW = val.split(' ').filter(Boolean);
    const tW = tgt.split(' ').filter(Boolean);
    const matched = tW.filter((w,i) => vW[i] === w).length;
    pctMatch = Math.round(matched / tW.length * 100);
    ok = pctMatch >= 75;
  } else {
    ok = val === tgt;
  }

  S.dictee.checked = true;
  if(ok){ S.dictee.score++; addXP(isP ? 20 : 15); }

  // Style visuel
  if(isP){
    inp.style.borderColor = ok ? 'var(--ok)' : 'var(--ko)';
    inp.style.color = ok ? 'var(--ok)' : 'var(--ko)';
  } else {
    inp.classList.add(ok ? 'ok' : 'ko');
  }
  inp.disabled = true;

  const fb = document.getElementById('d-fb');
  fb.className = 'feedback show ' + (ok ? 'ok' : 'ko');
  if(isP){
    fb.innerHTML = ok
      ? `✓ Nɔgɔ ! ${pctMatch === 100 ? 'Parfait !' : pctMatch + '% correct'} · +20 XP`
      : `✗ Sɔrɔli :<br><strong style="font-size:.88rem;font-weight:800">${item.text}</strong>`;
  } else {
    fb.innerHTML = ok
      ? `✓ Nɔgɔ ! ${item.ph} — ${item.tr} · +15 XP`
      : `✗ Sɔrɔli : <strong>${item.word}</strong> ${item.ph}<br><em>${item.tr}</em>`;
  }

  const nr = document.querySelector('#card-dictee .nav-row');
  if(nr) nr.innerHTML = `<span></span><button class="btn-nav primary" onclick="nextDictee()">Nata →</button>`;
}

function nextDictee(){ S.dictee.idx++; S.dictee.checked = false; renderDictee(); }

function initRecons(){S.recons={idx:0,placed:[],checked:false,score:0,list:shuffle([...RECONS_PH]),sh:null};renderRecons();}
function renderRecons(){
  const{idx,placed,checked,list,score}=S.recons;
  if(idx>=list.length){
    const pct=Math.round(score/list.length*100);
    S.history.push({label:'Lajɛ',score,total:list.length,pct});
    setProg('pb-recons','pt-recons',list.length,list.length,'Laban !');
    document.getElementById('card-recons').innerHTML=`<div class="card">
      <div class="card-label">🔀 Laban</div>
      <div class="result-big"><div class="result-num">${score}/${list.length}</div></div>
      <div class="nav-row" style="justify-content:center"><button class="btn-nav primary" onclick="initRecons()">↺ Dɔ tɔ</button></div>
    </div>`;return;
  }
  setProg('pb-recons','pt-recons',idx,list.length,`${idx+1} / ${list.length}`);
  const ph=list[idx];
  if(!S.recons.sh) S.recons.sh=shuffle([...ph.words]);
  const avail=S.recons.sh.filter(w=>!placed.includes(w));
  const placedH=placed.map(w=>`<span class="rtok placed" onclick="removeW(${JSON.stringify(w)},${checked})">${w}</span>`).join('');
  const availH=avail.map(w=>`<span class="rtok avail" onclick="placeW(${JSON.stringify(w)},${checked})">${w}</span>`).join('');
  const ok=checked&&placed.join(' ')===ph.words.join(' ');
  const fb=checked?`<div class="feedback show ${ok?'ok':'ko'}">${ok?'✓ Nɔgɔ ! +20 XP ⭐':'✗ Sɔrɔli : <strong>'+ph.words.join(' ')+'</strong>'}</div>`:'';

  document.getElementById('card-recons').innerHTML=`<div class="card">
    <div class="card-label">🔀 Lajɛ — kuma lajɛ</div>
    <div class="recons-label">I ka kɔrɔ</div>
    <div class="recons-zone">${placedH||'<span style="color:var(--line);font-size:.82rem">Kuma digi ye…</span>'}</div>
    <div class="recons-label">Kuma dɔnna</div>
    <div class="rwords">${availH}</div>
    ${fb}
    <div class="recons-tr">🟢 ${ph.trans}</div>
    <div class="listen-row" style="margin-top:10px">
      <button class="btn-snd normal" onclick="speak(${JSON.stringify(ph.words.join(' '))})">${spkI()} Mɛn</button>
    </div>
    <div class="nav-row">
      <button class="btn-nav" onclick="resetRecons()">↺</button>
      ${checked ? '<button class="btn-nav primary" onclick="nextRecons()">Nata →</button>' : '<button class="btn-nav primary" onclick="checkRecons()"' + (placed.length===ph.words.length ? '' : ' disabled') + '>Segin ✓</button>'}
    </div>
  </div>`;
}
function placeW(w,l){if(l)return;S.recons.placed=[...S.recons.placed,w];renderRecons();}
function removeW(w,l){if(l)return;const i=S.recons.placed.indexOf(w);if(i>-1)S.recons.placed=[...S.recons.placed.slice(0,i),...S.recons.placed.slice(i+1)];renderRecons();}
function checkRecons(){S.recons.checked=true;const ph=S.recons.list[S.recons.idx];if(S.recons.placed.join(' ')===ph.words.join(' ')){S.recons.score++;addXP(20);}renderRecons();}
function nextRecons(){S.recons.idx++;S.recons.placed=[];S.recons.checked=false;S.recons.sh=null;renderRecons();}
function resetRecons(){S.recons.placed=[];S.recons.checked=false;S.recons.sh=null;renderRecons();}

function renderPhon(){
  const cards=PHON.map(r=>`
    <div class="phon-card">

      <div class="phon-sound">${r.s}</div>
      <div class="phon-rule">${r.r}</div>
      <div class="phon-mk">${r.mk}</div>
      <div class="phon-exs">${r.ex.map(e=>`<span class="phon-ex" onclick="speak(${JSON.stringify(e)})">${e}</span>`).join('')}</div>
    </div>`).join('');
  document.getElementById('card-phon').innerHTML=`<div class="card">
    <div class="card-label">🔤 Sɛbɛn kalanden — Phonétique</div>
    <p style="font-size:.8rem;color:var(--muted);margin-bottom:16px;line-height:1.5">I ka sira sariyaw kalan — Apprends ces sons et lis n'importe quel mot ! Taaci exemple ka mɛn.</p>
    <div class="phon-grid">${cards}</div>
  </div>`;
}

// ═══════════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════════
function renderStats(){
  const hist=S.history.slice().reverse().map(h=>{
    const c=h.pct>=80?'g':h.pct>=50?'m':'b';
    return `<li class="hist-item"><span style="font-weight:700">${h.label}</span><span class="hscore ${c}">${h.score}/${h.total} (${h.pct}%)</span></li>`;
  }).join('')||'<li class="hist-item" style="color:var(--muted)">A foyi tɛ yen fɔlɔ.</li>';

  document.getElementById('card-stats').innerHTML=`<div class="card">
    <div class="card-label">📊 Kɛrɛnkɛrɛnna</div>
    <div class="stats-grid">
      <div class="scard"><div class="snum">${S.xp}</div><div class="slbl">XP ⭐</div></div>
      <div class="scard"><div class="snum">${MOTS.length}</div><div class="slbl">Kumaw</div></div>
      <div class="scard"><div class="snum">${PHRASES.length}</div><div class="slbl">Kɔrɔw</div></div>
      <div class="scard"><div class="snum">${QUIZ_Q.length}</div><div class="slbl">Ɲɛnabu</div></div>
      <div class="scard"><div class="snum">${RECONS_PH.length}</div><div class="slbl">Lajɛ</div></div>
      <div class="scard"><div class="snum">${PHON.length}</div><div class="slbl">Sira son</div></div>
    </div>
    <div style="font-size:.65rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:10px">Kɛliw lajɛli</div>
    <ul class="hist-list">${hist}</ul>
  </div>`;
}

// ═══════════════════════════════════════════════
//  ICÔNES SVG
// ═══════════════════════════════════════════════
function spkI(){return`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`;}
function clkI(){return`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
buildCats('cat-mots','all','setCatMots');
buildCats('cat-quiz','all','setCatQuiz');
S.quiz.questions=shuffle([...QUIZ_Q]);
renderMot();
renderPhrase();
renderQuiz();
initDictee();
initRecons();

// Voix préchargées via _loadVoices() dans la section SPEECH
</script>
